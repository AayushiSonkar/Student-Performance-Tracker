{% extends "base.html" %}
{% block title %}Add Grade - {{ student.name }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h4 class="fw-bold mb-1"><i class="bi bi-journal-plus"></i> Add Grade</h4>
                <p class="text-muted mb-4">for {{ student.name }} (Roll No: {{ student.roll_number }})</p>

                <form method="POST" action="{{ url_for('add_grade', student_id=student.id) }}">
                    <div class="mb-3">
                        <label for="subject" class="form-label">Subject</label>
                        <select class="form-select" id="subject" name="subject" required>
                            <option value="" disabled selected>-- Select a subject --</option>
                            {% for subject in subjects %}
                                <option value="{{ subject }}">{{ subject }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="mb-3">
                        <label for="marks" class="form-label">Marks (out of 100)</label>
                        <input type="number" class="form-control" id="marks" name="marks"
                               min="0" max="100" step="0.01" placeholder="e.g. 85" required>
                        <div class="form-text">Must be between 0 and 100.</div>
                    </div>

                    <div class="d-flex gap-2 mt-4">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-check-circle-fill"></i> Save Grade
                        </button>
                        <a href="{{ url_for('student_details', student_id=student.id) }}" class="btn btn-outline-secondary">
                            Cancel
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
